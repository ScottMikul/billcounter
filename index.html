<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Bill Counter</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bills">
<style>
  :root {
    color-scheme: dark;
    --bg: #0f172a;
    --panel: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --accent: #38bdf8;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 12px calc(env(safe-area-inset-bottom) + 12px) 12px;
  }
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: stretch;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 16px) 12px 12px 12px;
    background: var(--bg);
  }
  .sum-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .sum-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 2px;
  }
  .sum-value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .ac-btn {
    flex: 0 0 84px;
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .ac-btn:active { filter: brightness(0.85); }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .row {
    display: grid;
    grid-template-columns: 56px 20px 1fr 20px 1fr;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .denom {
    font-size: 20px;
    font-weight: 700;
    text-align: left;
  }
  .op {
    text-align: center;
    color: #64748b;
    font-size: 18px;
    font-weight: 600;
  }
  .qty-input {
    width: 100%;
    min-width: 0;
    background: #0b1220;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 20px;
    text-align: center;
    padding: 10px 4px;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .qty-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .product {
    font-size: 20px;
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  footer {
    text-align: center;
    color: #475569;
    font-size: 11px;
    padding-top: 16px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="sum-box">
      <div class="sum-label">Sum</div>
      <div class="sum-value" id="sum">$0</div>
    </div>
    <button class="ac-btn" id="ac" type="button">AC</button>
  </header>

  <div class="rows" id="rows"></div>

  <footer>Tap a box to enter bill count &middot; installable offline app</footer>
</div>

<script>
  const denominations = [100, 50, 20, 10, 5, 1];
  const rowsEl = document.getElementById('rows');
  const sumEl = document.getElementById('sum');
  const acBtn = document.getElementById('ac');
  const headerEl = document.querySelector('header');

  function syncHeaderSpacing() {
    rowsEl.style.marginTop = headerEl.offsetHeight + 'px';
  }
  window.addEventListener('resize', syncHeaderSpacing);
  syncHeaderSpacing();

  const inputs = [];
  const productEls = [];

  function formatMoney(n) {
    return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  function recalc() {
    let total = 0;
    denominations.forEach((denom, i) => {
      const raw = inputs[i].value;
      const qty = raw === '' ? 0 : Math.max(0, parseInt(raw, 10) || 0);
      const product = denom * qty;
      total += product;
      productEls[i].textContent = formatMoney(product);
    });
    sumEl.textContent = formatMoney(total);
  }

  denominations.forEach((denom) => {
    const row = document.createElement('div');
    row.className = 'row';

    const denomEl = document.createElement('div');
    denomEl.className = 'denom';
    denomEl.textContent = denom;

    const xEl = document.createElement('div');
    xEl.className = 'op';
    xEl.textContent = '×';

    const input = document.createElement('input');
    input.className = 'qty-input';
    input.type = 'number';
    input.inputMode = 'numeric';
    input.pattern = '[0-9]*';
    input.min = '0';
    input.placeholder = '0';

    const eqEl = document.createElement('div');
    eqEl.className = 'op';
    eqEl.textContent = '=';

    const productEl = document.createElement('div');
    productEl.className = 'product';
    productEl.textContent = '$0';

    // Erases the field's existing value as soon as it's entered, so the
    // user always starts from a blank field rather than appending digits.
    input.addEventListener('focus', () => {
      if (input.value !== '') {
        input.value = '';
        recalc();
      }
    });
    input.addEventListener('input', recalc);

    row.append(denomEl, xEl, input, eqEl, productEl);
    rowsEl.appendChild(row);

    inputs.push(input);
    productEls.push(productEl);
  });

  acBtn.addEventListener('click', () => {
    inputs.forEach((input) => { input.value = ''; });
    recalc();
  });

  recalc();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
